# This rule is not used by the project nats-failover-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to nats.failover.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nats-failover-controller
    app.kubernetes.io/managed-by: kustomize
  name: natsprofile-viewer-role
rules:
- apiGroups:
  - nats.failover.io
  resources:
  - natsprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - nats.failover.io
  resources:
  - natsprofiles/status
  verbs:
  - get
