# This rule is not used by the project eventbus-failover-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the failover.scheduler.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: eventbus-failover-controller
    app.kubernetes.io/managed-by: kustomize
  name: eventbusobservation-editor-role
rules:
- apiGroups:
  - failover.scheduler.dev
  resources:
  - eventbusobservations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - failover.scheduler.dev
  resources:
  - eventbusobservations/status
  verbs:
  - get
